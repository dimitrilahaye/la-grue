name: Migration

# Désactivé — à réactiver une fois Supabase et Render configurés.
# 1. Ajouter le secret MIGRATION_DATABASE_URL dans GitHub (Settings → Secrets)
# 2. Retirer le `if: false` sur le job migrate ci-dessous
on:
  workflow_dispatch:

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run Drizzle migrations
        run: npm run db:migrate
        env:
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
