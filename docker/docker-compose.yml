services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lagrue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lagrue}
      POSTGRES_DB: ${POSTGRES_DB:-lagrue}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lagrue}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    ports:
      - "8082:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
