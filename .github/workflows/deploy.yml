name: Deploy

on:
  workflow_run:
    workflows: [Migration]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy web service
        run: curl -fsS "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
