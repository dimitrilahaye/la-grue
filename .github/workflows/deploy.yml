name: Deploy

# Désactivé — à réactiver une fois Supabase et Render configurés.
# 1. Créer le Web Service sur Render et récupérer l'URL du deploy hook
# 2. Ajouter le secret RENDER_DEPLOY_HOOK_URL dans GitHub (Settings → Secrets)
# 3. Retirer le `if: false` sur le job deploy ci-dessous
on:
  workflow_run:
    workflows: [Integration]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Trigger Render deploy hook
        run: curl -fsS "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
